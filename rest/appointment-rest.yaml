- rest:
    path: /v1/doctor/appointment
    post:
      - path: /
        to: direct:doctor-appointment-create
    get:
      - path: /
        to: direct:doctor-appointment-list
      - path: /count
        to: direct:doctor-appointment-count
      - path: /{id}
        to: direct:doctor-appointment-get
    patch:
      - path: /{id}
        to: direct:doctor-appointment-update
      - path: /restore/{id}
        to: direct:doctor-appointment-restore
    delete:
      - path: /{id}
        to: direct:appointment-delete

- rest:
    path: /v1/public/appointment
    get:
      - path: /
        to: direct:public-appointment-list
      - path: /count
        to: direct:public-appointment-count
      - path: /{id}
        to: direct:public-appointment-get
    post:
      - path: /
        to: direct:public-appointment-create

- rest:
    path: /v1/staff/appointment
    get:
      - path: /
        to: direct:staff-appointment-list
    patch:
      - path: /{id}
        to: direct:staff-appointment-update

- rest:
    path: /v1/patient/appointment
    get:
      - path: /
        to: direct:patient-appointment-list
    patch:
      - path: /{id}
        to: direct:patient-appointment-update