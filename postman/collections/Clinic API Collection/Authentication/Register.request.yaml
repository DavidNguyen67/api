$kind: http-request
url: "{{base_url}}/api/v1/auth/register"
method: POST
body:
  type: json
  content: ""
  $type: |-
    {
        "type": "object",
        "properties": {
            "email": {
                "type": "string",
                "format": "email"
            },
            "name": {
                "type": "string"
            },
            "phone": {
                "type": "string"
            },
            "password": {
                "type": "string"
            },
            "dateOfBirth": {
                "type": "string"
            },
            "gender": {
                "type": "string"
            },
            "role": {
                "type": "string"
            }
        }
    }
order: 1000
